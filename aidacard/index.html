<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aida Gomes - Cartão Virtual</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .modal-qrcode {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center; align-items: center;
        }
        .modal-conteudo {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            max-width: 85%;
            position: relative;
        }
        .modal-conteudo img {
            width: 100%;
            max-width: 250px;
            height: auto;
        }
        .btn-fechar {
            margin-top: 15px;
            background: #333;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }
        /* Cor personalizada para o botão do QR Code */
        .btn-qrcode {
            background-color: #555555;
            color: white;
        }
    </style>
</head>
<body>

    <div class="cartao-container">
        <div class="perfil-topo">
            <div class="foto-container">
                <img src="Imagem/aidafoto.jpeg" alt="Daniel Gomes" class="foto-perfil">
            </div>
            <h1>Aida Gomes</h1>
            <p class="cargo">Representante Comercial</p>
            <p class="sub-empresa" style="font-size: 1.3rem; font-weight: 600; color: #333; margin-bottom: 20px;">Sano Representações</p>
        </div>
        

        <div class="links-container">
            
            <a href="#" id="btn-abrir-qrcode" class="btn-link btn-qrcode">
                <i class="fa-solid fa-qrcode"></i>
                <span>Compartilhar meu QR Code</span>
            </a>

            <a href="contato.vcf" id="btn-agenda-inteligente" download="Daniel_Gomes.vcf" type="text/vcard" class="btn-link btn-agenda">
                <i class="fa-solid fa-user-plus"></i>
                <span>Salvar na Agenda</span>
            </a>

            <a href="https://wa.me/5585999534177" target="_blank" class="btn-link btn-whatsapp">
                <i class="fa-brands fa-whatsapp"></i>
                <span>Conversar no WhatsApp</span>
            </a>

            <a href="tel:+5585999534177" class="btn-link btn-telefone">
                <i class="fa-solid fa-phone"></i>
                <span>Ligar Agora</span>
            </a>

            <a href="mailto:sano.representacoes@gmail.com" class="btn-link btn-email">
                <i class="fa-solid fa-envelope"></i>
                <span>Enviar E-mail</span>
            </a>

            <a href="https://www.sanorepresentacoes.com.br" target="_blank" class="btn-link btn-site">
                <i class="fa-solid fa-globe"></i>
                <span>Visitar Nosso Site</span>
            </a>

        </div>

        <div class="rodape">
            <img src="Imagem/Logo-Original.png" alt="Sano Representações" class="logo-empresa">
        </div>
    </div>

    <div id="janela-qrcode" class="modal-qrcode">
        <div class="modal-conteudo">
            <h3 style="font-family: 'Poppins', sans-serif; margin-bottom: 10px; color: #333;">Meu QR Code</h3>
            <img src="Imagem/aidaqrcode.png" alt="QR Code Sano Representações">
            <br>
            <button id="btn-fechar-qrcode" class="btn-fechar">Fechar</button>
        </div>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        // Lógica do Botão União (Android/iOS)
        var btnAgenda = document.getElementById("btn-agenda-inteligente");
        if (btnAgenda) {
            var isAndroid = /Android/i.test(navigator.userAgent);
            if (isAndroid) {
                btnAgenda.href = "https://drive.google.com/uc?export=download&id=1gJEhtTlLkWolUKIYNFw5A9bG6WpKQWx6";
                btnAgenda.removeAttribute("download");
                btnAgenda.removeAttribute("type");
                btnAgenda.target = "_blank";
            } else {
                btnAgenda.href = "contato.vcf";
                btnAgenda.setAttribute("download", "Daniel_Gomes.vcf");
                btnAgenda.setAttribute("type", "text/vcard");
                btnAgenda.removeAttribute("target");
            }
        }

        // 🎯 LÓGICA PARA ABRIR E FECHAR O QR CODE NA TELA
        var modal = document.getElementById("janela-qrcode");
        var btnAbrir = document.getElementById("btn-abrir-qrcode");
        var btnFechar = document.getElementById("btn-fechar-qrcode");

        btnAbrir.addEventListener("click", function(e) {
            e.preventDefault();
            modal.style.display = "flex";
        });

        btnFechar.addEventListener("click", function() {
            modal.style.display = "none";
        });

        // Fecha também se clicar fora do quadradinho branco
        modal.addEventListener("click", function(e) {
            if (e.target === modal) {
                modal.style.display = "none";
            }
        });
    });
    </script>
</body>
</html>
