<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Cartão Virtual</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="cartao-container">
        <div class="perfil-topo">
            <div class="foto-container">
                <img src="Imagem/daniel-imagem.jpeg" alt="Minha Foto" class="foto-perfil">
            </div>
            <h1>Seu Nome Completo</h1>
            <p class="cargo">Representante Comercial</p>
            <p class="sub-empresa">Sano Representações</p>
        </div>
        

        <div class="links-container">
            
            <a href="https://drive.google.com/file/d/1gJEhtTlLkWolUKIYNFw5A9bG6WpKQWx6/view?usp=drive_link" target="_blank" class="btn-link btn-agenda">
            <i class="fa-solid fa-user-plus"></i>
            <span>Salvar na Agenda</span>
          </a>

            <a href="https://wa.me/5585988307070" target="_blank" class="btn-link btn-whatsapp">
                <i class="fa-brands fa-whatsapp"></i>
                <span>Conversar no WhatsApp</span>
            </a>

            <a href="tel:+5585988307070" class="btn-link btn-telefone">
                <i class="fa-solid fa-phone"></i>
                <span>Ligar Agora</span>
            </a>

            <a href="mailto:daniel@sanorepresentacoes.com.br" class="btn-link btn-email">
                <i class="fa-solid fa-envelope"></i>
                <span>Enviar E-mail</span>
            </a>

            <a href="http://www.sanorepresentacoes.com.br" target="_blank" class="btn-link btn-site">
                <i class="fa-solid fa-globe"></i>
                <span>Visitar Nosso Site</span>
            </a>

        </div>

        <div class="rodape">
            <img src="Imagem/Logo-Original.png" alt="Logo Empresa" class="logo-empresa">
        </div>
    </div>

</body>
</html>
